name: Deploy Static Content to Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10.6.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.8.0'

      - name: Clean install dependencies (Main)
        run: |
          rm -rf main/node_modules
          pnpm install --no-frozen-lockfile
        working-directory: main

      - name: Build Main Production
        run: npm run build-github-main
        working-directory: main

      - name: Create Dist Folder
        run: mkdir dist

      - name: Copy Main Build
        run: cp -r main/dist/* dist/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4